<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可愛火柴人計時器 - 全格式支援版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Space+Mono', monospace;
            background-color: #fafafa;
        }

        .stickman-container {
            background-image: 
                linear-gradient(#e5e5e5 1px, transparent 1px),
                linear-gradient(90deg, #e5e5e5 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .stickman-transition {
            transition: all 3s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .animate-stick-bounce {
            animation: bounce 0.5s infinite;
        }

        @keyframes pulse-custom {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .animate-stick-pulse {
            animation: pulse-custom 0.5s infinite;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- 主要容器 -->
    <div id="main-container" class="relative w-full max-w-2xl h-[550px] bg-white border-4 border-black rounded-3xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] overflow-hidden p-8 flex flex-col items-center justify-between stickman-container">
        
        <!-- 頂部標題 -->
        <div class="relative z-10 text-center">
            <h1 class="text-2xl font-bold border-b-2 border-black mb-2 inline-block">專注探索者</h1>
            <p class="text-xs text-zinc-500">支援 MP3/WAV/MP4 等格式，開始後自動循環</p>
        </div>

        <!-- 倒數計時顯示 -->
        <div class="relative z-10 flex flex-col items-center">
            <div id="timer-display" class="text-8xl font-black tracking-tighter tabular-nums">
                25:00
            </div>
            
            <!-- 設定區 -->
            <div id="settings-area" class="mt-4 flex items-center gap-2">
                <label class="text-sm font-bold">設定分鐘:</label>
                <input 
                    id="minutes-input"
                    type="number" 
                    min="1" 
                    max="999"
                    value="25"
                    class="w-20 border-2 border-black rounded px-2 py-1 text-center focus:outline-none focus:bg-yellow-50"
                />
            </div>
        </div>

        <!-- 控制按鈕 -->
        <div class="relative z-10 flex flex-wrap justify-center gap-4 mb-4">
            <button id="start-pause-btn" class="flex items-center gap-2 px-8 py-4 bg-black text-white rounded-full font-bold hover:scale-105 transition-transform active:scale-95">
                <span id="start-pause-icon-container"><i data-lucide="play" class="w-5 h-5"></i></span>
                <span id="btn-text">開始計時</span>
            </button>
            
            <button id="reset-btn" class="flex items-center gap-2 px-8 py-4 border-2 border-black bg-white rounded-full font-bold hover:bg-zinc-100 transition-colors active:scale-95">
                <span><i data-lucide="rotate-ccw" class="w-5 h-5"></i></span>
                <span>重設</span>
            </button>
        </div>

        <!-- 工具列 -->
        <div class="relative z-10 w-full flex justify-between items-center border-t-2 border-black pt-4 bg-white/80 backdrop-blur-sm rounded-b-xl">
            <div class="flex items-center gap-4">
                <label class="cursor-pointer group flex items-center gap-2 text-sm font-bold">
                    <i data-lucide="upload" class="w-5 h-5 group-hover:text-pink-500"></i>
                    <span id="music-status" class="truncate max-w-[150px]">上傳音訊/影片</span>
                    <!-- 明確列出 accept 格式以相容各系統 -->
                    <input id="audio-upload" type="file" accept=".mp3,.wav,.m4a,.aac,.ogg,.mp4,.mov,.webm,audio/*,video/*" class="hidden" />
                </label>
                <button id="mute-btn" class="hover:scale-110 transition-transform">
                    <span id="mute-icon-container"><i data-lucide="volume-2" class="w-6 h-6"></i></span>
                </button>
            </div>
            <div class="text-xs text-zinc-400">
                火柴人狀態: <span id="status-text" class="text-black font-bold uppercase">休息</span>
            </div>
        </div>

        <!-- 火柴人本體 -->
        <div id="stickman" class="absolute stickman-transition pointer-events-none z-0" style="left: 50%; top: 50%; transform: translate(-50%, -50%);">
            <div id="stickman-wrapper" class="relative w-[40px] h-[60px]">
                <svg viewBox="0 0 40 60" class="w-full h-full">
                    <circle id="stickman-head" cx="20" cy="12" r="8" fill="none" stroke="black" stroke-width="2" />
                    <line x1="20" y1="20" x2="20" y2="40" stroke="black" stroke-width="2" />
                    <path id="stickman-arms" d="M10 30 L20 25 L30 30" fill="none" stroke="black" stroke-width="2" />
                    <path id="stickman-legs" d="M20 40 L15 58 M20 40 L25 58" fill="none" stroke="black" stroke-width="2" />
                </svg>
                <div id="stickman-bubble" class="hidden absolute -top-4 left-1/2 -translate-x-1/2 text-[10px] font-bold bg-white border border-black px-1 rounded">🎵</div>
            </div>
        </div>
    </div>

    <!-- 底部版本資訊與備註 -->
    <div class="mt-6 text-center text-[10px] text-zinc-400 leading-relaxed">
        <p class="font-bold">版本: v1.3 | 製作: AI 練習曲</p>
        <p>歡迎分享, 請勿商用</p>
        <p>Updated: Mar.28, 2026</p>
    </div>

    <!-- 完成彈窗 -->
    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
        <div class="bg-white border-4 border-black p-8 rounded-3xl shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] max-w-sm w-full text-center">
            <div class="mb-4 flex justify-center">
                <div class="w-16 h-16 bg-yellow-400 border-2 border-black rounded-full flex items-center justify-center animate-bounce">
                    <i data-lucide="bell-ring" class="w-8 h-8"></i>
                </div>
            </div>
            <h2 class="text-2xl font-black mb-2">時間到囉！</h2>
            <p class="mb-6 font-bold text-zinc-600">多媒體播放已停止。</p>
            <button id="modal-close" class="w-full py-3 bg-black text-white rounded-xl font-bold hover:bg-zinc-800 transition-colors active:scale-95">
                關閉鬧鈴
            </button>
        </div>
    </div>

    <!-- 音軌 -->
    <audio id="bgm-audio" loop></audio>
    <audio id="alarm-audio" src="https://raw.githubusercontent.com/freeCodeCamp/cdn/master/build/testable-projects-fcc/audio/BeepSound.wav"></audio>

    <script>
        // 初始化 Lucide 圖示
        lucide.createIcons();

        // DOM 元素
        const timerDisplay = document.getElementById('timer-display');
        const minutesInput = document.getElementById('minutes-input');
        const startPauseBtn = document.getElementById('start-pause-btn');
        const startPauseIconContainer = document.getElementById('start-pause-icon-container');
        const btnText = document.getElementById('btn-text');
        const resetBtn = document.getElementById('reset-btn');
        const audioUpload = document.getElementById('audio-upload');
        const bgmAudio = document.getElementById('bgm-audio');
        const alarmAudio = document.getElementById('alarm-audio');
        const muteBtn = document.getElementById('mute-btn');
        const muteIconContainer = document.getElementById('mute-icon-container');
        const statusText = document.getElementById('status-text');
        const settingsArea = document.getElementById('settings-area');
        const modal = document.getElementById('modal');
        const modalClose = document.getElementById('modal-close');
        
        const stickman = document.getElementById('stickman');
        const stickmanWrapper = document.getElementById('stickman-wrapper');
        const stickmanHead = document.getElementById('stickman-head');
        const stickmanArms = document.getElementById('stickman-arms');
        const stickmanLegs = document.getElementById('stickman-legs');
        const stickmanBubble = document.getElementById('stickman-bubble');

        // 狀態變數
        let totalSeconds = 25 * 60;
        let isActive = false;
        let timerId = null;
        let isMuted = false;

        // 更新顯示
        function updateDisplay() {
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            timerDisplay.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // 計時器邏輯
        function toggleTimer() {
            isActive = !isActive;
            if (isActive) {
                btnText.textContent = "暫停";
                startPauseIconContainer.innerHTML = '<i data-lucide="pause" class="w-5 h-5"></i>';
                settingsArea.classList.add('invisible');
                
                if (!isMuted && bgmAudio.src) {
                    bgmAudio.play().catch(e => console.warn("音訊播放受限:", e));
                }

                timerId = setInterval(() => {
                    if (totalSeconds > 0) {
                        totalSeconds--;
                        updateDisplay();
                    } else {
                        completeTimer();
                    }
                }, 1000);
            } else {
                clearInterval(timerId);
                btnText.textContent = "繼續計時";
                startPauseIconContainer.innerHTML = '<i data-lucide="play" class="w-5 h-5"></i>';
                bgmAudio.pause();
            }
            lucide.createIcons();
        }

        function resetTimer() {
            isActive = false;
            clearInterval(timerId);
            totalSeconds = parseInt(minutesInput.value) * 60 || 0;
            updateDisplay();
            btnText.textContent = "開始計時";
            startPauseIconContainer.innerHTML = '<i data-lucide="play" class="w-5 h-5"></i>';
            settingsArea.classList.remove('invisible');
            modal.classList.add('hidden');
            
            bgmAudio.pause();
            bgmAudio.currentTime = 0;
            alarmAudio.pause();
            alarmAudio.currentTime = 0;
            
            lucide.createIcons();
        }

        function completeTimer() {
            isActive = false;
            clearInterval(timerId);
            
            bgmAudio.pause();
            bgmAudio.currentTime = 0;
            
            if (!isMuted) {
                alarmAudio.currentTime = 0;
                alarmAudio.play().catch(e => console.error("響聲失敗:", e));
            }
            
            modal.classList.remove('hidden');
            updateStickmanAnimation('running');
        }

        // 火柴人動畫
        function updateStickmanAnimation(state) {
            statusText.textContent = (state === 'running' ? '慶祝中' : (state === 'walking' ? '閒晃' : (state === 'looking' ? '觀察' : '休息')));
            
            stickmanHead.classList.remove('animate-stick-bounce');
            stickmanArms.classList.remove('animate-stick-pulse');
            stickmanLegs.classList.remove('animate-stick-bounce');
            stickmanBubble.classList.add('hidden');

            if (state === 'walking') {
                stickmanArms.setAttribute('d', 'M10 25 L20 22 L30 25');
                stickmanLegs.setAttribute('d', 'M20 40 L12 55 M20 40 L28 55');
                stickmanLegs.classList.add('animate-stick-bounce');
            } else if (state === 'running') {
                stickmanArms.setAttribute('d', 'M10 25 L20 22 L30 25');
                stickmanLegs.setAttribute('d', 'M20 40 L10 50 M20 40 L30 50');
                stickmanArms.classList.add('animate-stick-pulse');
                stickmanLegs.classList.add('animate-stick-bounce');
            } else if (state === 'looking') {
                stickmanArms.setAttribute('d', 'M10 30 L20 25 L30 30');
                stickmanLegs.setAttribute('d', 'M20 40 L15 58 M20 40 L25 58');
                stickmanHead.classList.add('animate-stick-bounce');
                stickmanBubble.classList.remove('hidden');
                stickmanBubble.textContent = "?";
            }
            
            if (!bgmAudio.paused && bgmAudio.src) {
                stickmanBubble.classList.remove('hidden');
                stickmanBubble.textContent = "🎵";
            }
        }

        function moveStickman() {
            const container = document.getElementById('main-container');
            if (!container) return;
            const rect = container.getBoundingClientRect();
            const padding = 60;

            const states = ['walking', 'walking', 'running', 'looking', 'idle'];
            const newState = states[Math.floor(Math.random() * states.length)];
            updateStickmanAnimation(newState);

            if (newState === 'looking' || newState === 'idle') return;

            const targetX = Math.random() * (rect.width - padding * 2) + padding;
            const targetY = Math.random() * (rect.height - padding * 2) + padding;

            const currentX = parseFloat(stickman.style.left) || 50;
            const currentXPixel = (currentX / 100) * rect.width;
            
            stickmanWrapper.style.transform = targetX < currentXPixel ? 'scaleX(-1)' : 'scaleX(1)';
            stickman.style.left = `${(targetX / rect.width) * 100}%`;
            stickman.style.top = `${(targetY / rect.height) * 100}%`;
        }

        startPauseBtn.addEventListener('click', toggleTimer);
        resetBtn.addEventListener('click', resetTimer);
        modalClose.addEventListener('click', resetTimer);

        minutesInput.addEventListener('change', () => {
            if (!isActive) {
                totalSeconds = Math.max(0, parseInt(minutesInput.value) * 60 || 0);
                updateDisplay();
            }
        });

        audioUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                bgmAudio.src = url;
                document.getElementById('music-status').textContent = file.name;
                if (isActive && !isMuted) bgmAudio.play().catch(e => console.error(e));
            }
        });

        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            muteIconContainer.innerHTML = isMuted ? 
                '<i data-lucide="volume-x" class="w-6 h-6 text-red-500"></i>' : 
                '<i data-lucide="volume-2" class="w-6 h-6"></i>';
            
            if (isMuted) {
                bgmAudio.pause();
                alarmAudio.pause();
            } else if (isActive && bgmAudio.src) {
                bgmAudio.play();
            }
            lucide.createIcons();
        });

        setInterval(moveStickman, 3000);
        updateDisplay();
    </script>
</body>
</html>
